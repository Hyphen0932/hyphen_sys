<!DOCTYPE html>
<html lang="en">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #111827;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: "Montserrat", sans-serif;
        }

        .app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .text-container {
            position: relative;
            z-index: 1;
            margin: 1rem 0;
            text-align: center;
        }

        .text-container h1 {
            color: white;
            font-family: "Pridi", serif;
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .text-container p {
            color: #6b7280;
            font-weight: 500;
            letter-spacing: 0.05rem;
            margin: 0.5rem 0;
        }

        .text-container a {
            color: #06b6d4;
            text-decoration: none;
            cursor: pointer;
        }

        .text-container a:hover {
            border-bottom: 0.2rem solid #06b6d4;
        }

        #canyon-wrap {
            width: 100%;
        }

        #canyon-wrap svg {
            background-color: #374151;
            width: 100%;
            overflow: visible;
            display: block;
        }

        /* Cactus colours */
        .cactus .c1 { fill: #0e7490; }
        .cactus .c2 { fill: #155e75; }
        .cactus .c3 { fill: black; }

        /* Canyon layer colours */
        .rock-cols { fill: #4b5563; stroke: #1f2937; stroke-width: 5px; }
        .sky-bg    { fill: #111827; }
        .fog-band  { fill: #1f2937; }
        .fg-ground { fill: #111827; }

        /* 404 text */
        .svg-404 {
            fill: #6b7280;
            font-size: 660px;
            font-weight: 800;
            font-family: "Montserrat", sans-serif;
            filter: drop-shadow(0 0 50px #1f2937);
        }
    </style>
</head>

    // ── Helper: build one cactus <g> ─────────────────────────────────────────

        return `<g class="cactus" style="transform:translate(${x}px,${y}px) scale(${scale});transform-origin:center;transform-box:fill-box;">
            <path class="c1" d="${C1}"/>
            <path class="c2" d="${C2}"/>
            <path class="c3" d="${C3}"/>

    }

    // ── Build the full SVG string ─────────────────────────────────────────────

        d="m1831 198l-8 565l-95 3v-576.3zm-441-42v633.1h-257v-622.1zm-340 36v597.3h-201.7v-596.3zm-246 20v531.7h-53v-534.7zm-136-20v575.1h-153.4v-576.3zm-348 3v574.7h-159v-566.8z"/>

    document.getElementById('canyon-wrap').innerHTML = svg;

    // ── Parallax layer map (depth values match original React version) ────────
    //   depth > 0 → moves in mouse direction (foreground feel)
    //   depth < 0 → moves opposite (background feel)
    const layers = [
        { ids: ['lp3a', 'lp3b', 'lp3c', 'lp3d'], depth: -80  },
        { ids: ['lp1'],                             depth: -240 },
        { ids: ['lp2'],                             depth: -150 },
        { ids: ['lp4'],                             depth: -20  },

        { ids: ['lp7'],                             depth:  300 },
    ];

    document.addEventListener('mousemove', e => {
        requestAnimationFrame(() => {
            const nx = e.clientX / window.innerWidth  - 0.5; // -0.5 to 0.5
            const ny = e.clientY / window.innerHeight - 0.5;
            layers.forEach(({ ids, depth }) => {
                const tx = depth * nx;
                const ty = depth * ny;
                ids.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.style.transform = `translate(${tx}px,${ty}px)`;
                });
            });
        });
    });
