services:
  phpmyadmin:
    image: phpmyadmin:5.2-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PROD_PHPMYADMIN_BIND_IP:-127.0.0.1}:${PROD_PHPMYADMIN_PORT:-8089}:80"
    environment:
      TZ: ${TZ:-Asia/Singapore}
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      UPLOAD_LIMIT: 64M
    restart: unless-stopped